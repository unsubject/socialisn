  latestBriefing: "<h1>2026-04-06 晚報</h1>\n<h2>🎙 Podcast（最優先）</h2>\n<h3>Trump Ratchets Up Iran Threat With One-Day Countdown</h3>\n<p>特朗普向伊朗發出最後通牒，要求伊朗在週二晚前重開荷莫茲海峽，否則美國將轟炸其橋樑及電力設施。這場地緣政治危機正進入倒數階段，美伊雙方是否能達成停火協議備受關注。<br />\n- <strong>來源</strong>: Bloomberg Big Take Podcast (19分鐘)<br />\n- <strong>連結</strong>: https://omny.fm/shows/the-big-take/trump-ratchets-up-iran-threat-with-one-day-countdown</p>\n<h3>Gina Raimondo on How European Industry Is Getting Crushed</h3>\n<p>美國對歐洲施加關稅並批評北約盟國，歐洲產業面臨困境。美商務部前部長Gina Raimondo警告歐洲勿靠近中國，反映美歐關係在特朗普時代的緊張態勢及歐洲工業的脆弱處境。<br />\n- <strong>來源</strong>: Bloomberg Odd Lots Podcast (45分鐘)<br />\n- <strong>連結</strong>: https://omny.fm/shows/odd-lots/gina-raimondo-on-how-european-industry-is-getting-crushed</p>\n<h3>Ferraris, Advil, and AI Chips: 10 Companies to Watch Right Now</h3>\n<p>Bloomberg Intelligence分析師推薦第二季度值得關注的10家企業，涵蓋法拉利、止痛藥製造商及AI晶片公司Micron Technology等多個產業及地區，各具短期投資催化劑。<br />\n- <strong>來源</strong>: Bloomberg Intelligence Podcast (18分鐘)<br />\n- <strong>連結</strong>: https://omny.fm/shows/the-tape/ferraris-advil-and-ai-chips-10-companies-to-watch-right-now</p>\n<h3>Is the Economy Red, Orange, Yellow or Green?</h3>\n<p>節目邀請芝加哥聯儲主席Austan Goolsbee及克里夫蘭聯儲主席Beth Hammack評估美國經濟狀況，以紅橙黃綠等顏色代表經濟健康程度，為投資者提供直觀的經濟溫度計。<br />\n- <strong>來源</strong>: NPR The Indicator from Planet Money (9分鐘)<br />\n- <strong>連結</strong>: https://www.npr.org/2026/04/06/nx-s1-5773393/is-the-economy-red-orange-yellow-or-green</p>\n<h3>Reese's Heir vs. Chocolate Skimpflation</h3>\n<p>好時公司被指控在Reese's花生醬巧克力中使用廉價替代食材，引發消費者對「偷工減料通脹」現象的關注。這場官司凸顯食品製造商在成本壓力下的品質妥協問題。<br />\n- <strong>來源</strong>: NPR Planet Money (33分鐘)<br />\n- <strong>連結</strong>: https://www.npr.org/2026/04/03/nx-s1-5773425/reeses-peanut-butter-candy-chocolate-egg-easter-hershey-brad</p>\n<hr />\n<h2>頭條故事</h2>\n<h3>1. 特朗普向伊朗發出最後通牒 中東戰爭倒數計時</h3>\n<p>特朗普要求伊朗在週二晚前重開荷莫茲海峽，否則將轟炸其橋樑及電力設施，並在復活節週日發表措詞激烈的威脅言論。伊朗提出停火提案但被特朗普評為「重要但不足夠」，美伊45天停火協議談判陷入僵局，AI分析顯示談判破裂攬炒機會高達50-85%。<br />\n- <strong>來源</strong>: Bloomberg Po  <strong>連結</strong>: https://news.rthk.hk/rthk/ch/component/k2/1850144-20260407.htm</p>\n<h3>9. 香港汽油全球最貴高美國四倍 再生能源規劃缺失</h3>\n<p>香港汽油價格全球最貴，較美國高四倍，同時唯一風力發電站南丫風采發電站面臨拆卸。分析指香港再生能源規劃嚴重不足，能源政策滯後與「智慧都市」定位形成強烈反差，凸顯可持續發展的結構性問題。<br />\n- <strong>來源</strong>: 財經拆局<br />\n- <strong>連結</strong>: https://www.youtube.com/watch?v=6a2DGaBTKeM</p>\n<h3>10. 屯門邨巴因油價上升減班 運輸署緊急介入</h3>\n<p>屯門邨巴營辦商ABC旅運因柴油價格上升一度宣布減班，其後因未獲運輸署批准而撤回決定。事件反映伊朗戰爭推高國際油價對香港民生的連鎖影響，基層市民交通成本面臨上升壓力，運輸署已介入關注並與營辦商聯絡。<br />\n- <strong>來源</strong>: RTHK 本地新聞<br />\n- <strong>連結</strong>: https://news.rthk.hk/rthk/ch/component/k2/1850126-20260406.htm</p>\n<hr />\n<h2>主題分析</h2>\n<h3>中東局勢與能源危機</h3>\n<p>特朗普向伊朗發出最後通牒要求開放荷莫茲海峽，威脅轟炸基礎設施，美伊談判陷入僵局。伊朗停火提案被視為「不足夠」，談判破裂風險高達50-85%。OPEC+同意輕微增產但中東戰爭限制實際增產幅度，國際油價反覆高收近1%。印度時隔七年恢復從伊朗進口石油天然氣，尋求能源供應多元化。香港屯門邨巴因油價上升減班，運輸署緊急介入，反映能源危機對民生的連鎖衝擊。</p>\n<p><strong>相關項目</strong>:<br />\n- Trump Ratchets Up Iran Threat With One-Day Countdown (Bloomberg Podcast)<br />\n- 特朗普爆粗讚頌真主阿拉！更揚言或炸伊朗基建 (謎米香港)<br />\n- 油價反覆高收近1% (RTHK)<br />\n- India turns to Iran for oil and gas after 7-year hiatus (CNBC)<br />\n- 邨巴營辦商一度稱因柴油價格上升減班次 (RTHK)</p>\n<h3>美國軍事與地緣戰略</h3>\n<p>美軍成功執行敵後營救行動，救回被擊落的F15戰機飛行員，川普藉此彰顯美國民族精神。以色列參與行動，重現昔日突襲烏干達的歷史。特朗普推行「大北美」和「G2」戰略，意圖與中俄分割勢力範圍，邊緣化歐洲，北極等地成為大國交易籌碼。美國對歐洲施加關稅並批評北約盟國，歐洲產業面臨困境，美商務部前部長警告歐洲勿靠近中國。</p>\n<p><strong>相關項目</strong>:<br />\n- 敵後黑夜營救成功 川普得意叫囂 (風雲谷)<br />\n- 以色列參與營救行動 (城寨)<br />\n- 特朗普要跟中、俄分天下？「大北美」戰略曝光 (徐少驊)<br />\n- Gina Raimondo on How European Industry Is Getting Crushed (Bloomberg Podcast)</p>\n<h3>香港經濟與金融市場</h3>\n<p>香港強積金3月份損失逾千億，創25年最差表現，全球股市下跌和中東局勢影響退休保障。香港發展商在項目售罄後小幅加價測試買家意慾，海外專業人士回港推高豪宅租金。香港汽油全球最貴高美國四倍，再生能源規劃嚴重不足。強積金顧問認為平均基金開支比率仍有下調空間，積金局檢討供款入息水平有助增加退休保障。香港IPO集資額全球第一，彰顯國際金融中心地位。</p>\n<p><strong>相關項目</strong>:<br />\n- Hong Kong's MPF set to report worst performance in 3 years (SCMP)<br />\n- Hong Kong developers test homebuyers with price increases (SCMP)<br />\n- 香港汽油全球最貴高美國四倍 (財經拆局)<br />\n- 強積金顧問料平均基金開支比率仍有下調空間 (RTHK)<br />\n- 香港IPO集資額全球第一 (21世紀經濟報道)</p>\n<h3>中國政治與經濟                   boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }
      },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px" } },
          React.createElement("a", {
            href: item.url, target: "_blank", rel: "noopener",
            style: { fontSize: "13px", fontWeight: 600, color: "#1a1a1a",
                      textDecoration: "none", lineHeight: 1.4, flex: 1 }
          }, item.title),
          React.createElement("span", {
            style: { fontSize: "11px", color: "#999", whiteSpace: "nowrap" }
          }, `${item.views.toLocaleString()} 觀看`)
        ),
        React.createElement("div", { style: { fontSize: "11px", color: "#d4a017", marginTop: "4px" } }, item.channel),
        item.summary && React.createElement("p", {
          style: { fontSize: "12px", color: "#555", marginTop: "6px", lineHeight: 1.5 }
        }, item.summary)
      )
    )
  );
}

function NewsList({ items }) {
  if (!items.length) return React.createElement("p", { style: { color: "#999" } }, "暫無數據");
  return React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: "10px" } },
    items.map((item, i) =>
      React.createElement("div", {
        key: i,
        style: { background: "#fff", borderRadius: "8px", padding: "12px 16px",
                  boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }
      },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", gap: "8px" } },
          React.createElement("a", {
            href: item.url, target: "_blank", rel: "noopener",
            style: { fontSize: "13px", fontWeight: 600, color: "#1a1a1a",
                      textDecoration: "none", flex: 1, lineHeight: 1.4 }
          }, item.headline),
          React.createElement("span", {
            style: { fontSize: "11px", color: "#2d6a9f", whiteSpace: "nowrap" }
          }, item.source)
        ),
        item.summary && React.createElement("p", {
          style: { fontSize: "12px", color: "#555", marginTop: "6px", lineHeight: 1.5 }
        }, item.summary)
      )
    )
  );
}

function BriefingArchive({ archive }) {
  if (!archive.length) return React.createElement("p", { style: { color: "#999" } }, "暫無簡報");
  return React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: "6px" } },
    archive.map((entry, i) =>
      React.createElement("a", {
        key: i,
        href: `briefings/${entry.file}.html`,
        style: { fontSize: "13px", color: "#0066cc", textDecoration: "none",
                  padding: "6px 0", borderBottom: "1px solid #f0f0f0" }
      }, `【情報簡報】${entry.label}`)
    )
  );
}

function Section({ title, children, rssLink, rssHref }) {
  const feedUrl = rssHref || "feed.xml";
  return React.createElement("div", {
    style: { background: "#fff", borderRadius: "8px", padding: "20px 24px",
              boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }
  },
    React.createElement("div", {
      style: { display: "flex", justifyContent: "space-between", alignItems: "center",
                marginBottom: "16px" }
    },
      React.createElement("h2", {
        style: { fontSize: "15px", fontWeight: 700,
                  borderLeft: "3px solid #d4a017", paddingLeft: "10px" }
      }, title),
      rssLink && React.createElement("a", {
        href: feedUrl, style: { fontSize: "11px", color: "#d4a017" }
      }, "RSS ↗")
    ),
    children
  );
}

function LatestBriefing({ html }) {
  return React.createElement("div", {
    dangerouslySetInnerHTML: { __html: html },
    style: {
      fontSize: "13px", lineHeight: 1.8, color: "#1a1a1a",
      maxHeight: "600px", overflowY: "auto",
    }
  });
}

function App() {
  const [tab, setTab] = useState("briefing");
  const tabs = [
    { id: "briefing", label: "最新簡報" },
    { id: "youtube", label: "YouTube" },
    { id: "news", label: "新聞" },
    { id: "keywords", label: "關鍵詞" },
    { id: "archive", label: "簡報存檔" },
  ];

  return React.createElement("div", null,
    React.createElement(Header),
    React.createElement("div", {
      style: { display: "flex", gap: "12px", padding: "16px 24px 0",
                flexWrap: "wrap" }
    },
      React.createElement(StatCard, { label: "今日監測項目", value: DATA.totalItems }),
      React.createElement(StatCard, { label: "YouTube影片", value: DATA.youtubeCount }),
      React.createElement(StatCard, { label: "新聞文章", value: DATA.newsCount }),
      React.createElement(StatCard, { label: "關鍵詞", value: DATA.keywords.length }),
    ),
    React.createElement("div", {
      style: { display: "flex", gap: "4px", padding: "16px 24px 0", borderBottom: "1px solid #e0e0e0" }
    },
      tabs.map(t => React.createElement("button", {
        key: t.id,
        onClick: () => setTab(t.id),
        style: {
          padding: "8px 16px", fontSize: "13px", fontWeight: tab === t.id ? 700 : 400,
          background: tab === t.id ? "#1a1a1a" : "transparent",
          color: tab === t.id ? "#fff" : "#555",
          border: "none", borderRadius: "4px 4px 0 0", cursor: "pointer",
        }
      }, t.label))
    ),
    React.createElement("div", { style: { padding: "20px 24px", display: "flex", flexDirection: "column", gap: "16px" } },
      tab === "briefing" && React.createElement(Section, { title: "最新簡報", rssLink: true },
        React.createElement(LatestBriefing, { html: DATA.latestBriefing })
      ),
      tab === "youtube" && React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: "16px" } },
        React.createElement(Section, { title: "頻道活躍度", rssLink: true, rssHref: "youtube-feed.xml" },
          React.createElement(ChannelChart, { channels: DATA.channels })
        ),
        React.createElement(Section, { title: "熱門影片（按觀看數）" },
          React.createElement(YoutubeList, { items: DATA.topYoutube })
        )
      ),
      tab === "news" && React.createElement(Section, { title: "今日新聞" },
        React.createElement(NewsList, { items: DATA.news })
      ),
      tab === "keywords" && React.createElement(Section, { title: "今日關鍵詞雲" },
        React.createElement(KeywordCloud, { keywords: DATA.keywords })
      ),
      tab === "archive" && React.createElement(Section, { title: "簡報存檔", rssLink: true },
        React.createElement(BriefingArchive, { archive: DATA.archive })
      )
    )
  );
}

// Error boundary for debugging
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return React.createElement("div", {
        style: { padding: "32px", fontFamily: "monospace", color: "red" }
      }, "React error: " + this.state.error.toString());
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
