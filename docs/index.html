  latestBriefing: "<h1>2026-03-24 早報</h1>\n<h2>頭條故事</h2>\n<h3>1. 特朗普宣布暫停對伊朗打擊五天，美伊談判傳出積極訊號</h3>\n<p>特朗普宣布暫停對伊朗能源設施的軍事打擊五天，並聲稱美伊雙方已進行建設性談判，惟伊朗外交部否認有任何接觸。這一「高壓談判」姿態引發市場急劇波動：國際油價單日暴跌近11%，全球股市大幅反彈，道指收升631點，亞太市場今早普遍跟隨造好。<br />\n- <strong>來源：</strong> <a href=\"https://www.cnbc.com/2026/03/23/oil-prices-trump-iran-strait-of-hormuz-wti-crude-middle-east-lng-gas.html\">CNBC</a> ／ <a href=\"https://news.rthk.hk/rthk/ch/component/k2/1848507-20260324.htm\">RTHK</a> ／ <a href=\"https://www.scmp.com/business/china-business/article/3347552/global-markets-brace-rate-hikes-iran-war-and-us100-oil-stoke-tightening-fears?utm_source=rss_feed\">SCMP</a></p>\n<hr />\n<h3>2. 特朗普帖文前數分鐘市場成交量激增，引發內幕交易疑雲</h3>\n<p>在特朗普發布有關伊朗緩和的社媒帖文前數分鐘，美股期貨及油價期貨成交量異常急升，交易員及市場觀察者對交易時機的巧合深感疑惑。此事件涉及市場操控和政治資訊不對稱的嚴重質疑，值得密切關注後續調查發展。<br />\n- <strong>來源：</strong> <a href=\"https://www.cnbc.com/2026/03/23/volume-in-stock-and-oil-futures-surged-minutes-before-trumps-market-turning-post.html\">CNBC</a></p>\n<hr />\n<h3>3. 香港股市昨日重挫近千點，今早隨伊朗緩和消息急速反彈</h3>\n<p>受伊朗局勢緊張及全球加息預期拖累，恒生指數昨日曾挫逾千點，收市跌894點至24,382點，創近一年最大單日跌幅。今早局勢緩和，港股競價時段反彈377點，ADR普遍較昨收市上升，反映市場情緒極度波動。<br />\n- <strong>來源：</strong> <a href=\"https://www.scmp.com/business/china-business/article/3347522/hong-kong-stocks-tumble-asia-strait-hormuz-crisis-deepens?utm_source=rss_feed\">SCMP</a> ／ <a href=\"https://news.rthk.hk/rthk/ch/component/k2/1848533-20260324.htm\">RTHK</a></p>\n<hr />\n<h3>4. 美眾議院報告指中共以四大手法滲透聯合國</h3>\n<p>美國眾議院對中委員會發表專責報告，詳述中共如何利用資金、人事、規則及話語權等四大手法騎劫聯合國組織，將其轉化為服務北京外交利益的平台。此報告對中美在多邊機構的角力具重要政策意涵。<br />\n- <strong>來源：</strong> <a href=\"https://www.youtube.com/watch?v=uK1WJ8B2Q3Q\">城寨 YouTube</a></p>\n<hr />\n<h3>5. 銅鑼灣利舞臺廣場女廁發現初生男嬰遺體，警列殺嬰案</h3>\n<p>銅鑼灣利舞臺廣場女廁發現一名初生男嬰遺體，送院後證實死亡，警方已列作殺嬰案並由重案組跟進調查。案件震驚社會，引發外界對求助支援網絡是否足夠的關注。<br />\n- <strong>來源：</strong> <a href=\"https://news.rthk.hk/rthk/ch/component/k2/1848481-20260323.htm\">RTHK</a></p>\n<hr />\n<h2>主題分析</h2>\n<h3>主題一：美伊衝突與全球能源危機</h3>\n<p>伊朗與美國之間的軍事對峙進入第四週，雙方在談判與否的問題上各執一詞，令市場持續處於高度不確定狀態。中東超過40處能源資產遭重創，荷莫茲海峽的封鎖威脅波及全球石油供應，國際能源署警告修復需時。特朗普的「五日暫停」聲明令油價急挫逾10%，惟伊朗革命衛隊強硬派與民選總統之間的內部分歧，令談判前景仍充滿變數。</p>\n<p><strong>相關項目：</strong><br />\n- 特朗普暫停對伊朗打擊，美伊談判傳積極訊號 — <a href=\"https://www.cnbc.com/2026/03/23/oil-prices-trump-iran-strait-of-hormuz-wti-crude-middle-east-lng-gas.html\">CNBC</a><br />\n- 國際能源署：中東逾40處能源資產遭重創 — <a href=\"https://www.cnbc.com/2026/03/23/iran-war-energy-oil-gas-middle-east-iea-us-uae-qatar.html\">CNBC</a><br />\n- 阿聯酋油公司CEO：伊朗海峽襲擊是「經濟恐怖主義」 — <a href=\"https://www.cnbc.com/2026/03/23/iran-war-strait-hormuz-uae-adnoc.html\">CNBC</a><br />\n- 伊朗威脅美國國債購買者，局勢進一步升級 — <a href=\"https://www.cnbc.com/2026/03/23/iran-war-tensions-build-as-conflict-enters-its-fourth-week.html\">CNBC</a><br />\n- 伊朗戰爭或成電動車「遊戲改變者」，利好中國車企 — <a href=\"https://www.scmp.com/economy/china-economy/article/3347583/why-iran-war-could-be-game-changer-evs-and-chinas-car-industry?utm_source=rss_feed\">SCMP</a><br />\n- 亞洲尋求增加美國油氣供應，減少中東依賴 — <a href=\"https://www.cnbc.com/2026/03/23/asia-wants-more-us-oil-to-reduce-middle-east-dependence-burgum.html\">CNBC</a><br />\n- 城寨：伊朗大外宣誇大危機，掩蓋軍事衰退 — <a href=\"https://www.youtube.com/watch?v=jsBUJ-oWyVc\">城寨 YouTube</a><br />\n- 城寨：美伊談判高壓手法分析，伊朗內部革命衛隊分裂 — <a href=\"https://www.youtube.com/watch?v=yhgCDRG0tDs\">城寨 YouTube</a><br />\n- 中國發改委對成品油價採取臨時調控，漲幅降低近半 — <a href=\"https://news.rthk.hk/rthk/ch/component/k2/1848438-20260323.htm\">RTHK</a><br />\n- 中國翟雋：中國斡旋中東局勢有獨特優勢 — <a href=\"https://news.rthk.hk/rthk/ch/component/k2/1848502-20260324.htm\">RTHK</a></p>\n<hr />\n<h3>主題二：全球金融市場與經濟走向</h3>\n<p>伊朗局勢引發的能源衝擊成為牽動全球市場的核心變量，加息預期升溫令風險資產承壓，但特朗普緩和訊號令市場在短時間內急劇逆轉。亞洲市場今早普遍反彈，惟私募信貸基金贖回潮、亞洲私募股權融資跌至12年低位等信號顯示，資金流動壓力不容低估。</p>\n<p><strong>相關項目：</strong><br />\n- 全球市場因伊朗戰事憂慮加息，美聯儲暗示年內不減息 — <a href=\"https://www.scmp.com/business/china-business/article/3347552/global-markets-brace-rate-hikes-iran-war-and-us100-oil-stoke-tightening-fees?utm_source=rss_feed\">SCMP</a><br />\n- 特朗普帖文前成交量激增，內幕交易疑雲浮現 — <a href=\"https://www.cnbc.com/2026/03/23/volume-in-stock-and-oil-futures-surged         key: i,
        href: `briefings/${entry.file}.html`,
        style: { fontSize: "13px", color: "#0066cc", textDecoration: "none",
                  padding: "6px 0", borderBottom: "1px solid #f0f0f0" }
      }, `【情報簡報】${entry.label}`)
    )
  );
}

function Section({ title, children, rssLink }) {
  return React.createElement("div", {
    style: { background: "#fff", borderRadius: "8px", padding: "20px 24px",
              boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }
  },
    React.createElement("div", {
      style: { display: "flex", justifyContent: "space-between", alignItems: "center",
                marginBottom: "16px" }
    },
      React.createElement("h2", {
        style: { fontSize: "15px", fontWeight: 700,
                  borderLeft: "3px solid #d4a017", paddingLeft: "10px" }
      }, title),
      rssLink && React.createElement("a", {
        href: "feed.xml", style: { fontSize: "11px", color: "#d4a017" }
      }, "RSS ↗")
    ),
    children
  );
}

function LatestBriefing({ html }) {
  return React.createElement("div", {
    dangerouslySetInnerHTML: { __html: html },
    style: {
      fontSize: "13px", lineHeight: 1.8, color: "#1a1a1a",
      maxHeight: "600px", overflowY: "auto",
    }
  });
}

function App() {
  const [tab, setTab] = useState("briefing");
  const tabs = [
    { id: "briefing", label: "最新簡報" },
    { id: "youtube", label: "YouTube" },
    { id: "news", label: "新聞" },
    { id: "keywords", label: "關鍵詞" },
    { id: "archive", label: "簡報存檔" },
  ];

  return React.createElement("div", null,
    React.createElement(Header),
    React.createElement("div", {
      style: { display: "flex", gap: "12px", padding: "16px 24px 0",
                flexWrap: "wrap" }
    },
      React.createElement(StatCard, { label: "今日監測項目", value: DATA.totalItems }),
      React.createElement(StatCard, { label: "YouTube影片", value: DATA.youtubeCount }),
      React.createElement(StatCard, { label: "新聞文章", value: DATA.newsCount }),
      React.createElement(StatCard, { label: "關鍵詞", value: DATA.keywords.length }),
    ),
    React.createElement("div", {
      style: { display: "flex", gap: "4px", padding: "16px 24px 0", borderBottom: "1px solid #e0e0e0" }
    },
      tabs.map(t => React.createElement("button", {
        key: t.id,
        onClick: () => setTab(t.id),
        style: {
          padding: "8px 16px", fontSize: "13px", fontWeight: tab === t.id ? 700 : 400,
          background: tab === t.id ? "#1a1a1a" : "transparent",
          color: tab === t.id ? "#fff" : "#555",
          border: "none", borderRadius: "4px 4px 0 0", cursor: "pointer",
        }
      }, t.label))
    ),
    React.createElement("div", { style: { padding: "20px 24px", display: "flex", flexDirection: "column", gap: "16px" } },
      tab === "briefing" && React.createElement(Section, { title: "最新簡報", rssLink: true },
        React.createElement(LatestBriefing, { html: DATA.latestBriefing })
      ),
      tab === "youtube" && React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: "16px" } },
        React.createElement(Section, { title: "頻道活躍度" },
          React.createElement(ChannelChart, { channels: DATA.channels })
        ),
        React.createElement(Section, { title: "熱門影片（按觀看數）" },
          React.createElement(YoutubeList, { items: DATA.topYoutube })
        )
      ),
      tab === "news" && React.createElement(Section, { title: "今日新聞" },
        React.createElement(NewsList, { items: DATA.news })
      ),
      tab === "keywords" && React.createElement(Section, { title: "今日關鍵詞雲" },
        React.createElement(KeywordCloud, { keywords: DATA.keywords })
      ),
      tab === "archive" && React.createElement(Section, { title: "簡報存檔", rssLink: true },
        React.createElement(BriefingArchive, { archive: DATA.archive })
      )
    )
  );
}

// Error boundary for debugging
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return React.createElement("div", {
        style: { padding: "32px", fontFamily: "monospace", color: "red" }
      }, "React error: " + this.state.error.toString());
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
