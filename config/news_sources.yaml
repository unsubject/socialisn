# News Sources to Monitor
# Each entry requires:
#   name     — display name used in output JSON and dashboard
#   type     — "rss" or "scrape"
#   url      — RSS feed URL (for type: rss) or homepage/section URL (for type: scrape)
#   language — "zh-TW", "zh-CN", "en", etc.
#   tags     — optional labels for grouping
#
# Note: Perplexity Search API supplements RSS feeds with active news search.

sources:

  # ---------------------------------------------------------------------------
  # Simon's Own Feeds
  # ---------------------------------------------------------------------------

  - name: "Newsletter Digest"
    type: rss
    url: "https://unsubject.github.io/newsletter-digest/feed"
    language: zh-TW
    priority: normal
    tags:
      - simon
      - newsletter      
      
  # ---------------------------------------------------------------------------
  # Trending / Social Signal
  # ---------------------------------------------------------------------------

  - name: "Google Trends 香港熱搜"
    type: rss
    url: "https://trends.google.com/trending/rss?geo=HK"
    language: zh-TW
    tags:
      - hongkong
      - trending
      - social-signal
      - chinese

  # ---------------------------------------------------------------------------
  # English — International / HK
  # ---------------------------------------------------------------------------

  - name: "South China Morning Post"
    type: rss
    url: "https://www.scmp.com/rss/92/feed"
    language: en
    tags:
      - hongkong
      - english
      - general

  - name: "CNBC Asia Economy"
    type: rss
    url: "https://www.cnbc.com/id/100727362/device/rss/rss.html"
    language: en
    tags:
      - global
      - economics
      - english


  # ---------------------------------------------------------------------------
  # Traditional Chinese — RTHK
  # ---------------------------------------------------------------------------

  - name: "RTHK 財經新聞"
    type: rss
    url: "https://rthk.hk/rthk/news/rss/c_expressnews_cfinance.xml"
    language: zh-TW
    tags:
      - hongkong
      - economics
      - chinese

  - name: "RTHK 本地新聞"
    type: rss
    url: "https://rthk.hk/rthk/news/rss/c_expressnews_clocal.xml"
    language: zh-TW
    tags:
      - hongkong
      - politics
      - chinese

  - name: "RTHK 兩岸新聞"
    type: rss
    url: "https://rthk.hk/rthk/news/rss/c_expressnews_greaterchina.xml"
    language: zh-TW
    tags:
      - china
      - taiwan
      - chinese

  # ---------------------------------------------------------------------------
  # Traditional Chinese — HK Government
  # ---------------------------------------------------------------------------

  - name: "香港政府新聞網 — 財經"
    type: rss
    url: "https://www.news.gov.hk/tc/categories/finance/html/articlelist.rss.xml"
    language: zh-TW
    tags:
      - hongkong
      - economics
      - government
      - chinese

  # Note: 政府統計處, 財政司司長網誌, and 金管局 feeds removed — consistently
  # produced zero articles. Coverage replaced by Perplexity Search API
  # (see scripts/fetch_perplexity.py).
