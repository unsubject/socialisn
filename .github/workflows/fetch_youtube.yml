name: Fetch and Process Intelligence

on:
  schedule:
    # Twice daily: 00:00 and 12:00 UTC
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI for testing

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- YouTube ---
      - name: Fetch YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_youtube.py

      # --- News ---
      - name: Fetch news data
        run: python scripts/fetch_news.py

      # --- Haiku processing (YouTube + News) ---
      - name: Process all sources with Haiku
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/process_with_haiku.py --source all

      # --- Cleanup ---
      - name: Run data cleanup (30-day rolloff)
        if: ${{ github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch' }}
        run: python scripts/cleanup_old_data.py

      # --- Commit ---
      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: fetch + process $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
