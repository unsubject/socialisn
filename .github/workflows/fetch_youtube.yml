name: Fetch YouTube Data

on:
  schedule:
    # Twice daily: 00:00 and 12:00 UTC
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI for testing

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit data files back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works correctly
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r /youtube/requirements.txt

      - name: Run YouTube fetcher
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/youtube/fetch_youtube.py

      - name: Run data cleanup (30-day rolloff)
        # Only run cleanup on the midnight UTC run to save Actions minutes
        if: ${{ github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch' }}
        run: python scripts/cleanup_old_data.py

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: youtube fetch $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
