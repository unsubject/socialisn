name: Fetch and Process Intelligence

on:
  schedule:
    # Six times daily: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch:

# Prevent concurrent runs — if a run is in progress, cancel it and start fresh
concurrency:
  group: intelligence-pipeline
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --- Fetch ---
      - name: Fetch YouTube data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/fetch_youtube.py

      - name: Fetch news data
        run: python scripts/fetch_news.py

      - name: Fetch podcast data
        run: python scripts/fetch_podcasts.py

      # --- Haiku processing ---
      - name: Process all sources with Haiku
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/process_with_haiku.py --source all

      # --- Sonnet briefing + email (only at 00:00 and 12:00 UTC, or manual dispatch) ---
      - name: Check if briefing should run
        id: briefing_check
        run: |
          HOUR=$(date -u +%H)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "$HOUR" == "00" ]] || [[ "$HOUR" == "12" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping briefing (current hour: $HOUR UTC, only runs at 00/12)"
          fi

      - name: Generate briefing and send email
        if: steps.briefing_check.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/generate_briefing.py

      # --- RSS feeds ---
      - name: Generate briefing RSS feed
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_rss.py

      - name: Generate YouTube RSS feed
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_youtube_rss.py

      - name: Generate Podcast RSS feed
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_podcast_rss.py

      # --- Dashboard ---
      - name: Generate dashboard
        run: python scripts/generate_dashboard.py

      # --- Cleanup ---
      - name: Run data cleanup (30-day rolloff)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: python scripts/cleanup_old_data.py

      # --- Commit ---
      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "chore: fetch + process + briefing + dashboard $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin main
