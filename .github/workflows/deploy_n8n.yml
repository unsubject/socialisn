name: Deploy n8n workflows

on:
  push:
    branches: [main]
    paths:
      - "n8n/workflows/**.json"
      - "infra/init.sql"
      - ".github/workflows/deploy_n8n.yml"
  workflow_dispatch:

concurrency:
  group: deploy-n8n
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client jq

      - name: Apply DB migrations
        env:
          PG_CONN: ${{ secrets.PG_CONN }}
        run: |
          if [ -z "$PG_CONN" ]; then
            echo "PG_CONN secret is empty — skipping migration step"
            exit 0
          fi
          # Idempotent — safe to rerun.
          psql "$PG_CONN" -v ON_ERROR_STOP=1 \
            -c "ALTER TABLE newsletter_items ADD COLUMN IF NOT EXISTS summary TEXT;"

      - name: Upsert workflows via n8n REST API
        env:
          N8N_URL: ${{ secrets.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$N8N_URL" ] || [ -z "$N8N_API_KEY" ]; then
            echo "N8N_URL or N8N_API_KEY is empty — aborting"
            exit 1
          fi
          base="${N8N_URL%/}"

          # n8n rejects extra keys on POST/PUT; keep only what the API accepts.
          strip() {
            jq '{name, nodes, connections, settings: (.settings // {})}' "$1"
          }

          existing_json=$(curl -fsS -H "X-N8N-API-KEY: $N8N_API_KEY" "$base/api/v1/workflows?limit=250")

          shopt -s nullglob
          for f in n8n/workflows/*.json; do
            name=$(jq -r '.name' "$f")
            echo ">> Processing: $f (name=\"$name\")"

            id=$(echo "$existing_json" | jq -r --arg n "$name" '.data[] | select(.name == $n) | .id' | head -n1)
            payload=$(strip "$f")

            if [ -n "$id" ] && [ "$id" != "null" ]; then
              echo "   Updating id=$id"
              code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
                -X PUT \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                --data "$payload" \
                "$base/api/v1/workflows/$id")
            else
              echo "   Creating"
              code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
                -X POST \
                -H "X-N8N-API-KEY: $N8N_API_KEY" \
                -H "Content-Type: application/json" \
                --data "$payload" \
                "$base/api/v1/workflows")
            fi

            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "   FAILED ($code):"
              cat /tmp/resp.json
              exit 1
            fi
            echo "   OK ($code)"
          done

      - name: Summary
        run: |
          echo "Deployed workflows listed above. Activate each one and bind credentials in the n8n UI the first time."
